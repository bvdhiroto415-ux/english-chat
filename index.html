<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>English Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
    --accent: #6c63ff; --accent2: #a78bfa; --text: #e8e8f0;
    --muted: #7a7a9a; --green: #34d399; --yellow: #fbbf24; --red: #f87171;
    --radius: 14px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  html, body { height: 100%; overflow: hidden; }
  @supports (height: 100dvh) { html, body { height: 100dvh; } #chat-screen { height: 100dvh; } }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }
  #setup-screen { display: flex; flex-direction: column; align-items: center; height: 100%; overflow-y: auto; padding: 1.5rem 1rem calc(1.5rem + var(--safe-bottom)); padding-top: calc(1.5rem + var(--safe-top)); gap: 1.2rem; -webkit-overflow-scrolling: touch; }
  .logo { text-align: center; padding-top: 0.5rem; }
  .logo h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .logo p { color: var(--muted); margin-top: 0.3rem; font-size: 0.88rem; }
  .card { background: var(--surface); border: 1px solid #2a2d40; border-radius: var(--radius); padding: 1.2rem; width: 100%; max-width: 480px; }
  .card h2 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.75rem; }
  .api-input-wrap { display: flex; gap: 0.5rem; align-items: center; }
  input[type="password"] { flex: 1; background: var(--surface2); border: 1px solid #2a2d40; border-radius: 10px; color: var(--text); padding: 0.85rem 1rem; font-size: 16px; outline: none; transition: border-color 0.2s; min-height: 48px; }
  input:focus { border-color: var(--accent); }
  .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }
  .theme-card { background: var(--surface2); border: 2px solid transparent; border-radius: 10px; padding: 0.75rem 0.4rem; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; user-select: none; min-height: 76px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .theme-card:active { opacity: 0.75; }
  .theme-card.selected { border-color: var(--accent); background: #2a2642; }
  .theme-card .emoji { font-size: 1.5rem; margin-bottom: 0.25rem; }
  .theme-card .name { font-size: 0.72rem; font-weight: 700; }
  .theme-card .desc { font-size: 0.62rem; color: var(--muted); margin-top: 0.1rem; }
  .level-tabs { display: flex; gap: 0.5rem; }
  .level-tab { flex: 1; padding: 0.7rem 0.4rem; background: var(--surface2); border: 2px solid transparent; border-radius: 10px; text-align: center; cursor: pointer; transition: border-color 0.15s; font-size: 0.82rem; font-weight: 700; min-height: 56px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .level-tab:active { opacity: 0.75; }
  .level-tab.selected { border-color: var(--accent); background: #2a2642; }
  .level-tab .lv-label { color: var(--muted); font-size: 0.65rem; font-weight: 400; margin-top: 0.15rem; }
  .start-wrap { width: 100%; max-width: 480px; }
  .btn { background: var(--accent); color: white; border: none; border-radius: 12px; padding: 0.9rem 1.4rem; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s; min-height: 52px; width: 100%; display: flex; align-items: center; justify-content: center; }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #chat-screen { display: none; flex-direction: column; height: 100%; padding-top: var(--safe-top); }
  .chat-header { display: flex; align-items: center; gap: 0.8rem; padding: 0.75rem 1rem; background: var(--surface); border-bottom: 1px solid #2a2d40; flex-shrink: 0; }
  .back-btn { background: var(--surface2); border: none; color: var(--text); cursor: pointer; font-size: 1rem; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .chat-header-info { flex: 1; min-width: 0; }
  .chat-header-info h2 { font-size: 0.95rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-header-info p { font-size: 0.7rem; color: var(--muted); }
  .status-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 6px var(--green); flex-shrink: 0; }
  #messages { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 1rem; display: flex; flex-direction: column; gap: 0.9rem; -webkit-overflow-scrolling: touch; }
  .msg { display: flex; flex-direction: column; max-width: 85%; }
  .msg.ai { align-self: flex-start; }
  .msg.user { align-self: flex-end; }
  .msg-label { font-size: 0.65rem; color: var(--muted); margin-bottom: 0.25rem; padding: 0 0.3rem; }
  .msg.user .msg-label { text-align: right; }
  .bubble { padding: 0.8rem 0.95rem; border-radius: var(--radius); font-size: 0.9rem; line-height: 1.65; word-break: break-word; }
  .msg.ai .bubble { background: var(--surface); border: 1px solid #2a2d40; border-top-left-radius: 4px; }
  .msg.user .bubble { background: var(--accent); color: white; border-top-right-radius: 4px; }
  .feedback-block { margin-top: 0.65rem; padding: 0.65rem 0.8rem; background: var(--surface2); border-radius: 8px; border-left: 3px solid var(--yellow); font-size: 0.82rem; line-height: 1.6; }
  .feedback-block.good { border-left-color: var(--green); }
  .fb-title { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.3rem; color: var(--yellow); }
  .feedback-block.good .fb-title { color: var(--green); }
  .native-tag { display: inline-block; background: #2a2642; color: var(--accent2); font-size: 0.78rem; padding: 0.1rem 0.45rem; border-radius: 4px; margin: 0.1rem; }
  .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 0.7rem 1rem; background: var(--surface); border: 1px solid #2a2d40; border-radius: var(--radius); border-top-left-radius: 4px; width: fit-content; }
  .typing-indicator span { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.5; } 40% { transform: translateY(-6px); opacity: 1; } }
  .input-area { display: flex; gap: 0.5rem; align-items: flex-end; padding: 0.7rem 0.8rem; padding-bottom: calc(0.7rem + var(--safe-bottom)); background: var(--surface); border-top: 1px solid #2a2d40; flex-shrink: 0; }
  #user-input { flex: 1; background: var(--surface2); border: 1px solid #2a2d40; border-radius: 22px; color: var(--text); padding: 0.7rem 1rem; font-size: 16px; resize: none; max-height: 110px; outline: none; transition: border-color 0.2s; font-family: inherit; line-height: 1.5; -webkit-appearance: none; }
  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--muted); }
  #send-btn { width: 44px; height: 44px; border-radius: 50%; padding: 0; font-size: 1.1rem; flex-shrink: 0; background: var(--accent); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s, transform 0.1s; }
  #send-btn:active { transform: scale(0.9); }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: #2a2d40; border-radius: 2px; }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="logo">
    <h1>&#128483; English Chat</h1>
    <p>&#12493;&#12452;&#12486;&#12451;&#12502;&#12398;&#35328;&#12356;&#22238;&#12375;&#12391;&#26085;&#24120;&#20250;&#35441;&#12434;&#32340;&#32722;&#12375;&#12424;&#12358;</p>
  </div>
  <div class="card">
    <h2>Gemini API Key</h2>
    <div class="api-input-wrap">
      <input type="password" id="api-key-input" placeholder="AIza..." autocomplete="off">
    </div>
  </div>
  <div class="card">
    <h2>&#12486;&#12540;&#12510;&#1234;&#36984;&#12406;</h2>
    <div class="theme-grid">
      <div class="theme-card selected" data-theme="cafe"><span class="emoji">&#9749;</span><span class="name">&#12459;&#12501;&#12455;</span><span class="desc">&#27880;&#25991;&#12539;&#38920;&#35441;</span></div>
      <div class="theme-card" data-theme="work"><span class="emoji">&#128188;</span><span class="name">&#32887;&#22580;</span><span class="desc">&#20de5;&#20107;&#12398;&#20250;&#35441;</span></div>
      <div class="theme-card" data-theme="travel"><span class="emoji">&#9992;</span><span class="name">&#26053;&#34892;</span><span class="desc">&#35266;&#20809;&#12539;&#31227;&#21205;</span></div>
      <div class="theme-card" data-theme="friends"><span class="emoji">&#127881;</span><span class="name">&#21451;&#36948;&#12392;</span><span class="desc">&#12497;&#12540;&#12486;&#12451;&#12539;&#36942;&#12372;&#12375;</span></div>
      <div class="theme-card" data-theme="food"><span class="emoji">&#127829;</span><span class="name">&#39292;&#20107;</span><span class="desc">&#12524;&#12473;&#12488;&#12521;&#12531;</span></div>
      <div class="theme-card" data-theme="shopping"><span class="emoji">&#128717;</span><span class="name">&#12471;&#12519;&#12483;&#12500;&#12531;&#12464;</span><span class="desc">&#36023;&#12356;&#29289;</span></div>
      <div class="theme-card" data-theme="hobbies"><span class="emoji">&#127918;</span><span class="name">&#36942;&#21619;</span><span class="desc">&#36913;&#26411;&#12539;&#20313;&#26262;</span></div>
      <div class="theme-card" data-theme="health"><span class="emoji">&#127939;</span><span class="name">&#20581;&#24247;</span><span class="desc">&#36939;&#21205;&#12539;&#20307;&#35519;</span></div>
      <div class="theme-card" data-theme="smalltalk"><span class="emoji">&#128172;</span><span class="name">&#38920;&#35441;</span><span class="desc">&#12501;&#12522;&#12540;&#12488;&#12540;&#12463;</span></div>
    </div>
  </div>
  <div class="card">
    <h2>&#12524;&#12505;&#12523;</h2>
    <div class="level-tabs">
      <div class="level-tab selected" data-level="beginner">&#21021;&#32207;<span class="lv-label">&#31807;&#21333;&#12394;&#34920;&#29694;</span></div>
      <div class="level-tab" data-level="intermediate">&#20013;&#32207;<span class="lv-label">&#33258;&#28982;&#12394;&#20250;&#35441;</span></div>
      <div class="level-tab" data-level="advanced">&#19978;&#32207;<span class="lv-label">&#12473;&#12521;&#12531;&#12464;&#36796;&#12415;</span></div>
    </div>
  </div>
  <div class="start-wrap">
    <button class="btn" id="start-btn" onclick="startChat()">&#20250;&#35441;&#12434;&#22987;&#12417;&#12427; &#8594;</button>
  </div>
</div>

<div id="chat-screen">
  <div class="chat-header">
    <button class="back-btn" onclick="goBack()">&#8592;</button>
    <div class="chat-header-info">
      <h2 id="chat-title">Cafe conversation</h2>
      <p id="chat-subtitle">&#12493;&#12452;&#12486;&#12451;&#12502;&#12392;&#32340;&#32722;&#20013;</p>
    </div>
    <div class="status-dot"></div>
  </div>
  <div id="messages"></div>
  <div class="input-area">
    <textarea id="user-input" rows="1" placeholder="&#33521;&#35486;&#12391;&#36820;&#20107;&#12375;&#12390;&#12415;&#12424;&#12358;..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">&#8593;</button>
  </div>
</div>

<script>
var THEMES = {
  cafe:      { emoji: '\u2615', ja: '\u30ab\u30d5\u30a7',       en: 'Cafe / Coffee Shop' },
  work:      { emoji: '\ud83d\udcbc', ja: '\u8077\u5834',         en: 'Office / Workplace' },
  travel:    { emoji: '\u2708',  ja: '\u65c5\u884c',         en: 'Travel / Sightseeing' },
  friends:   { emoji: '\ud83c\udf89', ja: '\u53cb\u9054\u3063',       en: 'Hanging out with Friends' },
  food:      { emoji: '\ud83c\udf55', ja: '\u98df\u4e8b',         en: 'Food and Restaurants' },
  shopping:  { emoji: '\ud83d\udecd', ja: '\u30b7\u30e7\u30c3\u30d4\u30f3\u30b8', en: 'Shopping' },
  hobbies:   { emoji: '\ud83c\udfae', ja: '\u8da3\u5473',         en: 'Hobbies and Weekend' },
  health:    { emoji: '\ud83c\udfc3', ja: '\u5065\u5eb7',         en: 'Health and Fitness' },
  smalltalk: { emoji: '\ud83d\udcac', ja: '\u96d1\u8ac7',         en: 'Small Talk' }
};

var LEVELS = {
  beginner:     'Use simple, clear sentences. Avoid slang. Speak like you would to someone just learning English.',
  intermediate: 'Use natural everyday English with contractions, common idioms, and casual expressions natives actually use.',
  advanced:     'Use natural spoken English including slang, phrasal verbs, idioms, and colloquial expressions freely.'
};

var apiKey = '';
var selectedTheme = 'cafe';
var selectedLevel = 'beginner';
var conversationHistory = [];
var isTyping = false;

document.querySelectorAll('.theme-card').forEach(function(card) {
  card.addEventListener('click', function() {
    document.querySelectorAll('.theme-card').forEach(function(c) { c.classList.remove('selected'); });
    card.classList.add('selected');
    selectedTheme = card.dataset.theme;
  });
});

document.querySelectorAll('.level-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.level-tab').forEach(function(t) { t.classList.remove('selected'); });
    tab.classList.add('selected');
    selectedLevel = tab.dataset.level;
  });
});

var savedKey = localStorage.getItem('gemini_api_key');
if (savedKey) { document.getElementById('api-key-input').value = savedKey; }

function goBack() {
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  conversationHistory = [];
}

function startChat() {
  apiKey = document.getElementById('api-key-input').value.trim();
  if (!apiKey) { alert('Gemini API\u30ad\u30fc\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044'); return; }
  localStorage.setItem('gemini_api_key', apiKey);
  var theme = THEMES[selectedTheme];
  document.getElementById('chat-title').textContent = theme.emoji + ' ' + theme.ja;
  document.getElementById('chat-subtitle').textContent = theme.en + ' - ' + selectedLevel;
  document.getElementById('messages').innerHTML = '';
  conversationHistory = [];
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';
  sendToGemini(null, true);
}

function buildSystemPrompt() {
  var theme = THEMES[selectedTheme];
  var level = LEVELS[selectedLevel];
  var prompt = 'You are a friendly native English speaker having a casual conversation. ';
  prompt += 'The topic/setting is: ' + theme.en + '.\n\n';
  prompt += 'YOUR ROLE:\n';
  prompt += '- Ask natural, engaging questions that real native speakers actually use in everyday life\n';
  prompt += '- ' + level + '\n';
  prompt += '- Keep the conversation flowing naturally, one topic at a time\n\n';
  prompt += 'AFTER THE USER RESPONDS (from the 2nd turn onwards), follow this EXACT format:\n\n';
  prompt += '---FEEDABACK---\n';
  prompt += '[Write feedback in Japanese. Check for:\n';
  prompt += '1. Grammar mistakes - explain clearly in Japanese with a correction\n';
  prompt += '2. Unnatural expressions - suggest a more native-sounding alternative\n';
  prompt += '3. Good points - praise what they did well\n';
  prompt += 'If everything is perfect, just write: \u2705 \u5b8c\u74a7\u3067\u3059\uff01\u3068\u3066\u3082\u81ea\u7136\u306a\u82f1\u8a9e\u3067\u3059\u306d\uff01]\n';
  prompt += '---END FEEDBACK---\n\n';
  prompt += '[Then write your natural English reply + ask the next question]\n\n';
  prompt += 'IMPORTANT:\n';
  prompt += '- Feedback MUST be in Japanese\n';
  prompt += '- Use real spoken English (contractions: I\'m, don\'t, gonna, kinda)\n';
  prompt += '- Do NOT use formal/textbook English';
  return prompt;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function parseResponse(text, isFirst) {
  if (isFirst) { return { feedback: null, reply: text.trim() }; }
  var parts = text.split('---FEEDBACK---');
  if (parts.length >= 2) {
    var rest = parts[1].split('---END FEEDBACK---');
    var feedback = rest[0].trim();
    var reply = (rest[1] || '').trim();
    return { feedback: feedback, reply: reply };
  }
  return { feedback: null, reply: text.trim() };
}

function formatFeedback(text) {
  return escapeHtml(text).replace(/\n/g, '<br>');
}

function scrollToBottom() {
  var el = document.getElementById('messages');
  requestAnimationFrame(function() { el.scrollTop = el.scrollHeight; });
}

async function sendToGemini(userMessage, isFirst) {
  if (isTyping) { return; }
  isTyping = true;

  var md = document.getElementById('messages');
  var te = document.createElement('div');
  te.className = 'msg ai';
  te.id = 'typing';
  te.innerHTML = '<div class="msg-label">AI</div><div class="typing-indicator"><span></span><span></span><span></span></div>';
  md.appendChild(te);
  scrollToBottom();

  if (!isFirst && userMessage) {
    conversationHistory.push({ role: 'user', parts: [{ text: userMessage }] });
  }

  var contents = isFirst
    ? [{ role: 'user', parts: [{ text: 'Please start the conversation with a natural opening question for our topic.' }] }]
    : conversationHistory;

  var body = JSON.stringify({
    system_instruction: { parts: [{ text: buildSystemPrompt() }] },
    contents: contents,
    generationConfig: { temperature: 0.85, maxOutputTokens: 800 }
  });

  try {
    var res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + apiKey, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: body
    });
    var data = await res.json();
    if (!res.ok) { throw new Error((data.error && data.error.message) || 'HTTP ' + res.status); }
    var rawText = (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text) || '';

    var typing = document.getElementById('typing');
    if (typing) { typing.remove(); }

    var parsed = parseResponse(rawText, isFirst);
    var feedback = parsed.feedback;
    var reply = parsed.reply;

    var am = document.createElement('div');
    am.className = 'msg ai';
    var html = '<div class="msg-label">AI \u30cd\u30a4\u30c6\u30a3\u30d6</div><div class="bubble">' + escapeHtml(reply);
    if (feedback) {
      var isGood = feedback.indexOf('\u2705') >= 0 || feedback.indexOf('\u5b8c\u74a7') >= 0 || feedback.indexOf('\u81ea\u7136') >= 0;
      html += '<div class="feedback-block' + (isGood ? ' good' : '') + '">';
      html += '<div class="fb-title">' + (isGood ? '\u2705 \u6dfb\u524a' : '\ud83d\udcdd \u6dfb\u524a\u30fb\u30d5\u30a3\u30fc\u30c9\u30d0\u30c3\u30af') + '</div>';
      html += formatFeedback(feedback);
      html += '</div>';
    }
    html += '</div>';
    am.innerHTML = html;
    md.appendChild(am);

    conversationHistory.push({ role: 'model', parts: [{ text: rawText }] });
    scrollToBottom();
  } catch(e) {
    var typing2 = document.getElementById('typing');
    if (typing2) { typing2.remove(); }
    var em = document.createElement('div');
    em.className = 'msg ai';
    em.innerHTML = '<div class="bubble" style="border-color:var(--red);color:var(--red);">\u30a8\u30e9\u30fc: ' + escapeHtml(e.message) + '</div>';
    md.appendChild(em);
    scrollToBottom();
  }
  isTyping = false;
}

function sendMessage() {
  var input = document.getElementById('user-input');
  var text = input.value.trim();
  if (!text || isTyping) { return; }
  input.value = '';
  input.style.height = 'auto';
  var md = document.getElementById('messages');
  var um = document.createElement('div');
  um.className = 'msg user';
  um.innerHTML = '<div class="msg-label">\u3042\u306a\u305f</div><div class="bubble">' + escapeHtml(text) + '</div>';
  md.appendChild(um);
  scrollToBottom();
  sendToGemini(text, false);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}
</script>
</body>
</html>
